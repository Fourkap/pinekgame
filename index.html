<style>
  :root{
    --green-0:#1f5d44; --green-1:#184635; --green-2:#102b21; --green-3:#0b1f18;
    --gold:#d6b46e; --gold-soft:#e7cf94; --gold-bright:#f0dca8;
    --cream:#f4eddb; --cream-dim:#cdc6b3;
    --maxw:1080px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--cream);
    background:radial-gradient(120% 90% at 50% -10%, var(--green-0) 0%, var(--green-1) 38%, var(--green-2) 72%, var(--green-3) 100%);
    background-attachment:fixed;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  a{color:var(--gold-soft);text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}

  /* langue */
  .langbar{position:fixed;top:14px;right:16px;z-index:50;
    background:rgba(11,31,24,.6);backdrop-filter:blur(8px);border:1px solid rgba(214,180,110,.35);
    border-radius:999px;padding:6px 6px 6px 14px;display:flex;align-items:center;gap:7px}
  .langbar .globe{color:var(--gold-soft);font-size:.95rem}
  .langbar select{font:inherit;font-size:.85rem;font-weight:600;color:var(--cream);
    background:transparent;border:none;border-radius:999px;padding:3px 4px;cursor:pointer;outline:none}
  .langbar select option{color:#10261c}
  html[dir="rtl"] .langbar{right:auto;left:16px}

  /* hero */
  header{position:relative;text-align:center;padding:88px 0 70px;overflow:hidden}

  /* logo officiel : les 4 cartes se distribuent au chargement, médaillon figé devant */
  .hero-art{margin:0 auto;display:flex;justify-content:center}
  .emblem{width:min(300px,76vw);display:block;filter:drop-shadow(0 12px 26px rgba(0,0,0,.45));
    opacity:0;animation:emblemIn .6s ease .1s forwards}
  @keyframes emblemIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.emblem{animation:none;opacity:1}}
  .wordmark{font-size:clamp(2.6rem,9vw,4.4rem);font-weight:800;letter-spacing:.22em;margin:18px 0 0 .22em;color:var(--cream);text-shadow:0 2px 0 rgba(0,0,0,.18)}
  .tagline{font-size:clamp(1rem,2.6vw,1.28rem);color:var(--gold-soft);font-weight:600;margin-top:10px;padding:0 14px}
  .subtag{color:var(--cream-dim);margin-top:6px;font-size:.98rem;padding:0 14px}
  .diamond-sep{margin:22px auto 0;color:var(--gold);letter-spacing:.5em;opacity:.7;font-size:.8rem}

  /* badges */
  .stores{display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:30px}
  .badge-img{height:54px;width:auto;display:block;transition:transform .18s ease, filter .18s ease}
  .badge-img:hover{transform:translateY(-3px);filter:brightness(1.08)}

  section{padding:64px 0}
  h2.sec{text-align:center;font-size:clamp(1.5rem,4vw,2.1rem);font-weight:800;color:var(--cream)}
  h2.sec::after{content:"";display:block;width:54px;height:3px;border-radius:3px;background:var(--gold);margin:14px auto 0}
  .lead{text-align:center;max-width:640px;margin:18px auto 0;color:var(--cream-dim);line-height:1.7}

  .features{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;margin-top:42px}
  .feat{background:rgba(244,237,219,.05);border:1px solid rgba(214,180,110,.22);border-radius:18px;padding:26px 22px;transition:.25s}
  .feat:hover{border-color:rgba(214,180,110,.5);background:rgba(244,237,219,.08);transform:translateY(-4px)}
  .feat .ic{font-size:1.7rem;width:52px;height:52px;display:grid;place-items:center;background:rgba(214,180,110,.14);border-radius:13px;margin-bottom:14px}
  .feat h3{font-size:1.12rem;color:var(--gold-soft);margin-bottom:7px}
  .feat p{color:var(--cream-dim);font-size:.95rem;line-height:1.6}

  .shots{display:flex;gap:26px;justify-content:center;flex-wrap:wrap;margin-top:44px}
  .phone{width:220px;border-radius:30px;border:6px solid #0b1f18;box-shadow:0 18px 40px rgba(0,0,0,.45);overflow:hidden;background:#0b1f18;transition:transform .3s ease}
  .phone:hover{transform:translateY(-8px) scale(1.02)}
  .phone img{width:100%;display:block}
  .tablet{width:min(360px,82vw);border-radius:26px;border:10px solid #0b1f18;box-shadow:0 22px 50px rgba(0,0,0,.5);overflow:hidden;background:#0b1f18;margin:46px auto 8px;transition:transform .3s ease}
  .tablet:hover{transform:translateY(-8px) scale(1.02)}
  .tablet img{width:100%;display:block}
  .ipad-cap{text-align:center;color:var(--gold-soft);font-weight:600;font-size:.95rem;margin-top:4px}

  /* étapes */
  .steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-top:42px}
  .step{background:rgba(244,237,219,.05);border:1px solid rgba(214,180,110,.22);border-radius:18px;padding:30px 22px 24px;text-align:center}
  .step .num{display:inline-grid;place-items:center;width:46px;height:46px;border-radius:50%;background:var(--gold);color:#10261c;font-weight:800;font-size:1.2rem;margin-bottom:12px}
  .step h3{color:var(--gold-soft);font-size:1.1rem;margin-bottom:6px}
  .step p{color:var(--cream-dim);font-size:.95rem;line-height:1.6}
  /* bande d'atouts */
  .hlband{padding:26px 0}
  .hlrow{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
  .hl{display:inline-flex;align-items:center;gap:8px;background:rgba(214,180,110,.12);border:1px solid rgba(214,180,110,.3);border-radius:999px;padding:9px 18px;font-weight:600;color:var(--cream);font-size:.95rem}

  .cta{text-align:center}
  .cta .stores{margin-top:26px}

  footer{border-top:1px solid rgba(214,180,110,.2);padding:34px 0 46px;text-align:center;color:var(--cream-dim);font-size:.9rem}
  footer a{margin:0 10px;font-weight:600}
  footer .ml{margin-top:12px;opacity:.7;font-size:.82rem}

  .reveal{opacity:0;transform:translateY(26px);transition:opacity .7s ease, transform .7s ease}
  .reveal.in{opacity:1;transform:none}
</style>

  };

  var RTL = {ar:1};

  function renderStores(t){
    var html =
      '<a class="badge" href="'+APP_STORE+'"><img class="badge-img" src="assets/badge-appstore.svg" alt="Download on the App Store"/></a>'+
      '<a class="badge" href="'+PLAY_STORE+'"><img class="badge-img" src="assets/badge-googleplay.png" alt="Get it on Google Play"/></a>';
    document.querySelectorAll('[data-stores]').forEach(function(el){ el.innerHTML = html; });
  }

  function setLang(l){
    var t = T[l] || T.en;
    document.documentElement.lang = l;
    document.documentElement.dir = RTL[l] ? 'rtl' : 'ltr';
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      var k = el.getAttribute('data-i18n');
      if(t[k] != null) el.textContent = t[k];
    });
    renderStores(t);
    document.title = 'PINEK — ' + t.tagline;
    var md = document.getElementById('metaDesc');
    if(md) md.setAttribute('content', t.tagline + ' ' + t.subtag);
    var sel = document.getElementById('langSelect');
    if(sel) sel.value = l;
    try{ localStorage.setItem('pinek_lang', l); }catch(e){}
  }

  (function(){
    var saved;
    try{ saved = localStorage.getItem('pinek_lang'); }catch(e){}
    var nav = (navigator.language || 'fr').slice(0,2);
    var l = saved || (T[nav] ? nav : 'en');
    setLang(l);
  })();

  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
  }, {threshold:.15});
  document.querySelectorAll('.reveal').forEach(function(el){ io.observe(el); });
</script>
